<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oita High School News</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif; cursor: none; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020617, #1e1b4b, #1e3a8a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: 1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        .slide { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(1.1) translateY(30px); transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1); visibility: hidden; }
        .slide.active { opacity: 1; transform: scale(1) translateY(0); visibility: visible; z-index: 20; }
        .slide.leaving { opacity: 0; transform: scale(0.9) translateY(-30px); z-index: 10; }
        .content-box { width: 85%; max-width: 1200px; padding: 60px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 60px 120px rgba(0,0,0,0.7); }
        .header-meta { display: flex; align-items: center; margin-bottom: 25px; }
        .source-tag { display: inline-flex; align-items: center; background: #e63946; color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 10px 25px rgba(230, 57, 70, 0.4); }
        .source-tag.global { background: #00aaff; box-shadow: 0 10px 25px rgba(0, 170, 255, 0.4); }
        .source-tag i { margin-right: 12px; }
        .genre-name { margin-left: 20px; font-size: 1.3rem; color: rgba(255,255,255,0.7); font-weight: bold; letter-spacing: 2px; }
        .title { font-size: 4.4rem; font-weight: bold; margin-bottom: 30px; line-height: 1.4; border-bottom: 7px solid #e63946; padding-bottom: 25px; }
        .title.global { border-bottom-color: #00aaff; }
        .excerpt { font-size: 2.2rem; line-height: 1.7; color: #f1f5f9; min-height: 3.4em; }
        .meta-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
        .meta-time { font-size: 1.6rem; color: #00aaff; font-weight: bold; }
        #ticker { position: absolute; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(0, 0, 0, 0.95); z-index: 50; overflow: hidden; display: flex; align-items: center; border-top: 4px solid #e63946; }
        .ticker-text { white-space: nowrap; font-size: 2.5rem; font-weight: bold; padding-left: 100%; animation: scroll 50s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        #clock { position: absolute; top: 40px; right: 60px; font-size: 3rem; font-weight: bold; color: rgba(255,255,255,0.9); z-index: 100; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="clock">00:00:00</div>
    <div id="app"><div id="slide1" class="slide"></div><div id="slide2" class="slide"></div></div>
    <div id="ticker"><div class="ticker-text">【大分現地情報】OBS大分放送・大分合同新聞の最新ニュースを優先放送中。</div></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;

        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                setInterval(nextSlide, 15000); // 15秒間隔
            }
            setInterval(updateNews, 300000); 
        }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP');
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            const isLocal = item.source === '大分現地情報';
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="source-tag ${isLocal ? '' : 'global'}">
                            <i class="${item.icon}"></i> ${item.source}
                        </div>
                        <span class="genre-name">${item.genre}</span>
                    </div>
                    <div class="title ${isLocal ? '' : 'global'}">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-footer">
                        <div class="meta-time">${item.time} 更新</div>
                    </div>
                </div>
            `;
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            requestAnimationFrame(() => {
                currentEl.classList.remove('active');
                currentEl.classList.add('leaving');
                nextEl.classList.remove('leaving');
                nextEl.classList.add('active');
            });

            activeSlideId = nextSlideId;
            setTimeout(() => {
                document.getElementById(activeSlideId === 1 ? 'slide2' : 'slide1').classList.remove('leaving');
            }, 3000);
        }
        init();
    </script>
</body>
</html>
