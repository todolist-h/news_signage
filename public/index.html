<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard & ToDo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #3498db;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-color: #333;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ニュースセクション（10秒切り替え） */
    #news-ticker {
      background: var(--primary-color);
      color: white;
      padding: 10px 20px;
      height: 40px;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .news-label {
      background: #e74c3c;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-right: 15px;
      z-index: 10;
    }

    .news-item {
      position: absolute;
      left: 100px;
      opacity: 0;
      /* ニュースの切り替えを10秒に設定 */
      animation: display-news 10s infinite;
    }

    /* 複数ニュースがある場合の遅延設定（例） */
    .news-item:nth-child(2) { animation-delay: 0s; }
    .news-item:nth-child(3) { animation-delay: 10s; }

    @keyframes display-news {
      0% { opacity: 0; transform: translateY(20px); }
      5% { opacity: 1; transform: translateY(0); }
      95% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }

    /* メインコンテンツエリア */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    /* ToDoリスト関連 */
    .todo-section { overflow-y: auto; }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
      transition: background 0.3s;
    }
    .todo-item.starred { background: #fffdf0; }
    .todo-item.urgent { border-left: 5px solid #e74c3c; }

    .star-btn {
      color: #ccc;
      cursor: pointer;
      margin-right: 10px;
    }
    .star-btn.active { color: #f1c40f; }

    /* 校内連絡（滑らかなテロップ） */
    #school-announcement {
      background: #34495e;
      color: white;
      height: 50px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .announcement-title {
      background: #2ecc71;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      z-index: 10;
      font-weight: bold;
    }

    .telop-container {
      flex: 1;
      overflow: hidden;
    }

    .telop-content {
      display: inline-block;
      padding-left: 100%;
      font-size: 1.2rem;
      /* 滑らかな動きを実現するための設定 */
      animation: telop-move 25s linear infinite;
      will-change: transform;
    }

    @keyframes telop-move {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    /* ログイン・入力フォーム */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input[type="text"], input[type="date"] {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--accent-color);
      color: white;
    }

    [v-cloak] { display: none; }
  </style>
</head>
<body>

<div id="app" v-cloak>
  <header id="news-ticker">
    <span class="news-label">NEWS</span>
    <div class="news-item">本日の時間割変更：3限の数学は自習になります。</div>
    </header>

  <main>
    <section class="card todo-section">
      <h2><i class="fas fa-list-check"></i> マイタスク</h2>
      
      <div class="input-group">
        <input type="text" v-model="newTodo" placeholder="新しいタスクを入力..." @keyup.enter="doAdd">
        <input type="date" v-model="newDate">
        <button class="btn" @click="doAdd">追加</button>
      </div>

      <div class="todo-list">
        <div v-for="item in activeTodos" :key="item.id" 
             :class="['todo-item', { starred: item.isStarred, urgent: isUrgent(item.dueDate) }]">
          <i class="fa-star star-btn" :class="item.isStarred ? 'fas active' : 'far'" @click="doToggleStar(item)"></i>
          <div style="flex:1">
            <div style="font-weight:bold">{{ item.comment }}</div>
            <small v-if="item.dueDate"><i class="far fa-calendar-alt"></i> 期限: {{ item.dueDate }}</small>
          </div>
          <button @click="doChangeState(item)" class="btn" style="background:#2ecc71">完了</button>
        </div>
      </div>
    </section>

    <aside class="card">
      <div v-if="!user">
        <button class="btn" @click="login" style="width:100%"><i class="fab fa-google"></i> Googleでログイン</button>
      </div>
      <div v-else>
        <p>ようこそ、{{ user.displayName }} さん</p>
        <button class="btn" @click="logout" style="background:#95a5a6; width:100%">ログアウト</button>
      </div>
      <hr>
      <h3>設定</h3>
      <label><input type="checkbox" v-model="notificationEnabled" @change="toggleNotification"> 通知を有効にする</label>
    </aside>
  </main>

  <footer id="school-announcement">
    <div class="announcement-title">校内連絡</div>
    <div class="telop-container">
      <div class="telop-content">
        【連絡】明日の避難訓練は雨天のため延期となりました。　【図書室】新着図書が入荷しました！ぜひ放課後に立ち寄ってください。　【美化委員会】清掃用具の点検を行います。
      </div>
    </div>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script src="js/main.js"></script> </body>
</html>
