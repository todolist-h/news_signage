<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>School Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #222; color: #fff; font-family: sans-serif; }
        #app { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s ease-in-out; z-index: 1; background: #000; }
        .active { opacity: 1; z-index: 2; }
        .slide img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .content-box { position: absolute; bottom: 10%; left: 5%; width: 85%; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 10; }
        .title { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
        .excerpt { font-size: 1.6rem; line-height: 1.6; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            await updateNews();
            render();
            setInterval(render, 7000);
            setInterval(updateNews, 600000);
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            const div = document.createElement('div');
            div.className = 'slide';
            
            const img = document.createElement('img');
            // 画像読み込み時にリファラを送らない設定を明示
            img.referrerPolicy = "no-referrer";
            img.src = item.image;
            
            img.onerror = function() {
                // NHKのロゴもリファラなしで再試行
                if (!this.src.includes('picsum.photos')) {
                   this.src = "https://picsum.photos/1920/1080?grayscale";
                }
            };

            div.appendChild(img);
            div.innerHTML += `<div class="content-box">
                                <div class="title">${item.title}</div>
                                <div class="excerpt">${item.excerpt}</div>
                             </div>`;
            app.appendChild(div);
            setTimeout(() => div.classList.add('active'), 50);
            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => app.removeChild(old), 1300);
            }
            currentIndex = (currentIndex + 1) % newsItems.length;
        }
        init();
    </script>
</body>
</html>
