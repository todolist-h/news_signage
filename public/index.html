<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oita High School Signage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #001a33; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; cursor: none; }
        
        /* 動く背景グラデーション */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #001a33, #002a4d, #004080, #001a33);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            z-index: 1;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transform: scale(1.08) translateY(15px);
            transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
            will-change: opacity, transform;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            visibility: visible;
            z-index: 20;
        }

        .slide.leaving {
            opacity: 0;
            transform: scale(0.95) translateY(-15px);
            z-index: 10;
        }

        .content-box {
            width: 80%; max-width: 1200px; padding: 60px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }

        .header-meta {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
        }

        .genre-tag {
            display: inline-flex; align-items: center;
            background: #00aaff; color: #fff;
            padding: 10px 24px; border-radius: 50px;
            font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }
        .genre-tag i { margin-right: 12px; }

        .source-name { font-size: 1.3rem; color: rgba(255,255,255,0.6); font-weight: bold; letter-spacing: 1px; }

        .title { font-size: 4rem; font-weight: bold; margin-bottom: 35px; line-height: 1.35; border-bottom: 5px solid rgba(0, 170, 255, 0.5); padding-bottom: 25px; }
        .excerpt { font-size: 2.1rem; line-height: 1.6; color: #e2e8f0; margin-bottom: 0; }
        .meta-time { margin-top: 35px; font-size: 1.5rem; color: #00aaff; text-align: right; font-weight: bold; }
        
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(0, 0, 0, 0.85); z-index: 50;
            overflow: hidden; display: flex; align-items: center;
            border-top: 3px solid #00aaff;
        }
        .ticker-text {
            white-space: nowrap; font-size: 2.4rem; font-weight: bold;
            padding-left: 100%; animation: scroll 45s linear infinite;
            color: #fff;
        }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* 右上の時計 */
        #clock {
            position: absolute; top: 30px; right: 40px;
            font-size: 2.5rem; font-weight: bold; color: rgba(255,255,255,0.8);
            z-index: 100; text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="clock">00:00:00</div>
    <div id="app">
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
    </div>
    <div id="ticker">
        <div class="ticker-text">【学校連絡】大分県内の最新ニュースを配信しています。／ 廊下は静かに歩き、他学年の授業を妨げないようにしましょう。／ 本日の部活動終了時刻は18:30です。</div>
    </div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;

        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                setInterval(nextSlide, 12000); 
            }
            setInterval(updateNews, 600000); // 10分更新
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error("News Load Error", e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="genre-tag"><i class="${item.icon}"></i> ${item.genre}</div>
                        <div class="source-name">${item.source}</div>
                    </div>
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-time">${item.time} 更新</div>
                </div>
            `;
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            requestAnimationFrame(() => {
                currentEl.classList.remove('active');
                currentEl.classList.add('leaving');
                nextEl.classList.remove('leaving');
                nextEl.classList.add('active');
            });

            activeSlideId = nextSlideId;

            setTimeout(() => {
                const inactiveId = activeSlideId === 1 ? 2 : 1;
                document.getElementById(`slide${inactiveId}`).classList.remove('leaving');
            }, 3000);
        }

        init();
    </script>
</body>
</html>
