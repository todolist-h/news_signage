<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Digital Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: "Helvetica Neue", Arial, sans-serif; cursor: none; }
        #app { position: relative; width: 100vw; height: 100vh; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1;
            /* 画像が出ない時のための予備背景（おしゃれな青系グラデーション） */
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        
        .active { opacity: 1; z-index: 2; }

        .slide img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            filter: brightness(0.5); /* 文字を読みやすくするために暗くする */
        }

        .content-box {
            position: absolute; bottom: 12%; left: 5%; width: 85%;
            padding: 40px; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px); /* 背景をぼかして高級感を出す */
            z-index: 10; border-left: 12px solid #fff;
        }

        .title { font-size: 3.8rem; font-weight: bold; margin: 0 0 20px 0; line-height: 1.2; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .excerpt { font-size: 1.8rem; line-height: 1.6; color: #f0f0f0; margin: 0; }
        .meta { margin-top: 20px; font-size: 1.3rem; color: #93c5fd; font-weight: bold; }
        
        #progress { position: absolute; bottom: 0; left: 0; height: 10px; background: #fff; width: 0%; z-index: 20; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            console.log("System Ready");
            await updateNews();
            render();
            setInterval(render, 8000);
            setInterval(updateNews, 600000);
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error("Update failed", e); }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            const div = document.createElement('div');
            div.className = 'slide';
            
            // 画像要素の作成
            const img = document.createElement('img');
            img.src = item.image;
            img.onload = () => console.log("Image loaded:", item.image);
            img.onerror = function() {
                console.warn("Image fail, using fallback color");
                this.style.display = 'none'; // 画像を消して背景グラデーションを見せる
            };

            div.appendChild(img);
            div.innerHTML += `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">NHK NEWS | ${item.time} 更新</div>
                </div>
            `;
            
            app.appendChild(div);
            setTimeout(() => div.classList.add('active'), 100);

            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => { if(old.parentNode) app.removeChild(old); }, 1600);
            }

            const bar = document.getElementById('progress');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '100%'; }, 50);

            currentIndex = (currentIndex + 1) % newsItems.length;
        }
        init();
    </script>
</body>
</html>
