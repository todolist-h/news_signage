<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oita School Signage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif; cursor: none; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #001a33, #002a4d, #004080); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: 1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        .slide { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(1.1) translateY(20px); transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1); visibility: hidden; will-change: opacity, transform; }
        .slide.active { opacity: 1; transform: scale(1) translateY(0); visibility: visible; z-index: 20; }
        .slide.leaving { opacity: 0; transform: scale(0.9) translateY(-20px); z-index: 10; }
        .content-box { width: 85%; max-width: 1200px; padding: 60px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 50px 100px rgba(0,0,0,0.6); }
        .header-meta { display: flex; align-items: center; margin-bottom: 25px; }
        .genre-tag { display: inline-flex; align-items: center; background: #00aaff; color: #fff; padding: 10px 25px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0, 170, 255, 0.4); }
        .genre-tag i { margin-right: 12px; }
        .local-label { margin-left: 20px; font-size: 1.2rem; color: #ffcc00; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .title { font-size: 4.2rem; font-weight: bold; margin-bottom: 30px; line-height: 1.4; border-bottom: 6px solid #00aaff; padding-bottom: 20px; }
        .excerpt { font-size: 2.1rem; line-height: 1.7; color: #f1f5f9; }
        .meta-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .source-name { font-size: 1.4rem; color: rgba(255,255,255,0.5); }
        .meta-time { font-size: 1.6rem; color: #00aaff; font-weight: bold; }
        #ticker { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(0, 0, 0, 0.9); z-index: 50; overflow: hidden; display: flex; align-items: center; border-top: 2px solid #00aaff; }
        .ticker-text { white-space: nowrap; font-size: 2.2rem; font-weight: bold; padding-left: 100%; animation: scroll 40s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        #clock { position: absolute; top: 40px; right: 50px; font-size: 2.8rem; font-weight: bold; color: rgba(255,255,255,0.8); z-index: 100; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="clock">00:00:00</div>
    <div id="app"><div id="slide1" class="slide"></div><div id="slide2" class="slide"></div></div>
    <div id="ticker"><div class="ticker-text">【学校連絡】大分合同新聞・OBS大分放送のニュースを優先配信中。／ 学校生活のルールを守り、安全な廊下歩行を心がけましょう。</div></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;

        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                setInterval(nextSlide, 14000); 
            }
            setInterval(updateNews, 300000); 
        }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP');
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error("News Load Error", e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            const isLocal = item.genre.includes('大分') || item.genre.includes('OBS');
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="genre-tag" style="background:${isLocal ? '#e63946' : '#00aaff'}">
                            <i class="${item.icon}"></i> ${item.genre}
                        </div>
                        ${isLocal ? '<span class="local-label">● LOCAL OITA</span>' : ''}
                    </div>
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-footer">
                        <div class="source-name">${item.source}</div>
                        <div class="meta-time">${item.time} 更新</div>
                    </div>
                </div>
            `;
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            requestAnimationFrame(() => {
                currentEl.classList.remove('active');
                currentEl.classList.add('leaving');
                nextEl.classList.remove('leaving');
                nextEl.classList.add('active');
            });

            activeSlideId = nextSlideId;
            setTimeout(() => {
                document.getElementById(activeSlideId === 1 ? 'slide2' : 'slide1').classList.remove('leaving');
            }, 3000);
        }
        init();
    </script>
</body>
</html>
