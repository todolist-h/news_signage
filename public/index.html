<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Oita School Sunshine Signage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #e0f2fe; color: #1e293b; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif; cursor: none; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f0f9ff, #bae6fd, #7dd3fc); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: 1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        
        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transform: translate3d(0, 15px, 0);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-out;
            visibility: hidden;
            will-change: opacity, transform;
        }
        .slide.active { opacity: 1; transform: translate3d(0, 0, 0); visibility: visible; z-index: 20; }
        .slide.leaving { opacity: 0; transform: translate3d(0, -15px, 0); z-index: 10; }

        .content-box {
            width: 80%; max-width: 1050px; padding: 45px 65px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .header-meta { display: flex; align-items: center; margin-bottom: 20px; }
        .source-tag { display: inline-flex; align-items: center; color: #fff; padding: 8px 22px; border-radius: 50px; font-size: 1.4rem; font-weight: bold; }
        .source-tag i { margin-right: 10px; }

        .title { font-size: 3.6rem; font-weight: 800; margin-bottom: 25px; line-height: 1.4; color: #0f172a; padding-bottom: 20px; border-bottom: 6px solid #cbd5e1; transition: border-color 0.5s ease; }
        .excerpt { font-size: 1.9rem; line-height: 1.7; color: #334155; }
        .meta-footer { display: flex; justify-content: flex-end; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .meta-time { font-size: 1.4rem; color: #64748b; font-weight: bold; }

        #ticker-container { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 50; }
        #progress-bar { width: 0%; height: 6px; background: #f59e0b; transition: width 0.1s linear, background-color 0.5s ease; }
        
        /* テロップエリア：親要素に3Dレンダリング空間を固定 */
        #ticker { 
            height: 75px; 
            background: #0f172a; 
            overflow: hidden; 
            position: relative;
            transform: translateZ(0); 
        }

        .ticker-text { 
            position: absolute;
            white-space: nowrap; 
            color: #f8fafc; 
            font-size: 2.2rem; 
            font-weight: bold; 
            line-height: 75px;
            display: inline-block;
            padding-left: 100vw; /* 画面右端から開始 */
            
            /* 速度 38s / 高精度アニメーション設定 */
            animation: scroll 38s linear infinite; 
            will-change: transform;
            transform: translate3d(0, 0, 0);
            -webkit-font-smoothing: antialiased;
        }
        
        @keyframes scroll { 
            0% { transform: translate3d(0, 0, 0); } 
            100% { transform: translate3d(-100%, 0, 0); } 
        }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="app">
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
    </div>
    <div id="ticker-container">
        <div id="progress-bar"></div>
        <div id="ticker">
            <div id="ticker-content" class="ticker-text">情報を読み込み中...</div>
        </div>
    </div>

    <script>
        const API_URL = '/api/news';
        const INFO_URL = '/info.txt';
        const SLIDE_DURATION = 10000; 
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;
        let progressInterval;
        let startTime;

        async function init() {
            await updateNews();
            await updateSchoolInfo();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                startProgress();
            }
            setInterval(async () => {
                await updateNews();
                await updateSchoolInfo();
            }, 300000); 
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error("ニュース取得失敗", e); }
        }

        async function updateSchoolInfo() {
            try {
                const res = await fetch(INFO_URL + '?t=' + Date.now());
                if (!res.ok) return;
                const rawText = await res.text();
                const lines = rawText.split(/\r?\n/);
                const now = new Date();
                const todayStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
                const month = now.getMonth() + 1;
                const date = now.getDate();
                const dayOfWeek = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
                const dateLabel = `【${month}月${date}日（${dayOfWeek}）】`;

                let fixedText = "", todayText = "";
                lines.forEach(line => {
                    const t = line.trim();
                    if (!t) return;
                    if (t.startsWith("[固定]")) {
                        fixedText = t.replace("[固定]", "【お知らせ】");
                    } else {
                        const m = t.match(/^\[(\d{4}\/\d{2}\/\d{2})\]/);
                        if (m && m[1] === todayStr) {
                            todayText = t.replace(m[0], dateLabel);
                        }
                    }
                });

                const contentEl = document.getElementById('ticker-content');
                if (todayText) {
                    contentEl.textContent = `${todayText}　／　${fixedText}`;
                } else {
                    contentEl.textContent = fixedText || "【連絡】現在、特別な連絡事項はありません。";
                }
            } catch (e) { console.error("校内ニュース読み込み失敗", e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            const isLocal = item.source.includes('大分') || item.source.includes('OBS') || item.source.includes('OAB') || item.source.includes('TOS');
            const accentColor = isLocal ? '#f59e0b' : '#3b82f6';
            document.getElementById('progress-bar').style.backgroundColor = accentColor;
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="source-tag" style="background: ${accentColor}">
                            <i class="${item.icon}"></i> ${item.source}
                        </div>
                    </div>
                    <div class="title" style="border-bottom-color: ${accentColor}">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-footer">
                        <div class="meta-time">${item.time} 更新</div>
                    </div>
                </div>
            `;
        }

        function startProgress() {
            clearInterval(progressInterval);
            startTime = Date.now();
            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const pct = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
                document.getElementById('progress-bar').style.width = pct + '%';
                if (elapsed >= SLIDE_DURATION) nextSlide();
            }, 100);
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);
            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);
            requestAnimationFrame(() => {
                currentEl.classList.replace('active', 'leaving');
                nextEl.classList.add('active');
            });
            activeSlideId = nextSlideId;
            setTimeout(() => {
                const inactiveId = activeSlideId === 1 ? 2 : 1;
                document.getElementById(`slide${inactiveId}`).classList.remove('leaving');
            }, 1500);
            startProgress();
        }
        init();
    </script>
</body>
</html>
