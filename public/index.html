<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School News Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #001a33; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif; cursor: none; }
        
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #001a33, #002a4d, #004080, #001a33);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            z-index: 1;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            
            /* --- アニメーション設定 --- */
            opacity: 0;
            transform: scale(1.08) translateY(10px); /* 少し大きく、下に配置しておく */
            /* 消える時もゆっくりにするために transition を設定 */
            transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
            will-change: opacity, transform;
        }

        /* アクティブ（表示中）の状態 */
        .slide.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            visibility: visible;
            z-index: 20;
        }

        /* 退出中（消えていく瞬間）の状態を明示的に作る */
        .slide.leaving {
            opacity: 0;
            transform: scale(0.95) translateY(-10px); /* 少し小さく、上に消えていく */
            z-index: 10;
        }

        .content-box {
            width: 80%; padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .genre-tag {
            display: inline-block;
            background: #00aaff;
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 170, 255, 0.4);
        }

        .title { font-size: 3.8rem; font-weight: bold; margin-bottom: 30px; line-height: 1.3; border-bottom: 4px solid rgba(255,255,255,0.2); padding-bottom: 20px; }
        .excerpt { font-size: 1.8rem; line-height: 1.6; color: #e2e8f0; }
        .meta { margin-top: 30px; font-size: 1.4rem; color: #00aaff; text-align: right; }
        
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.85); z-index: 50;
            overflow: hidden; display: flex; align-items: center;
            border-top: 2px solid #00aaff;
        }
        .ticker-text { white-space: nowrap; font-size: 2.2rem; font-weight: bold; padding-left: 100%; animation: scroll 40s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="app">
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
    </div>
    <div id="ticker">
        <div class="ticker-text">【学校連絡】安心・安全なニュースを配信中。／ 廊下は静かに右側を歩きましょう。</div>
    </div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;

        async function init() {
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                setInterval(nextSlide, 12000); // 余裕を持って12秒間隔
            }
            setInterval(updateNews, 600000);
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            el.innerHTML = `
                <div class="content-box">
                    <div class="genre-tag">${item.icon} ${item.genre}</div>
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">NHK NEWS | ${item.time} 更新</div>
                </div>
            `;
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            // 1. 次のスライドの中身を準備
            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            // 2. クラスの付け替え
            requestAnimationFrame(() => {
                // 現在のスライドを「退場中」にする
                currentEl.classList.remove('active');
                currentEl.classList.add('leaving');
                
                // 次のスライドを「入場」させる
                nextEl.classList.remove('leaving');
                nextEl.classList.add('active');
            });

            // 3. 次回の切り替えに備えてIDを更新
            activeSlideId = nextSlideId;

            // 4. 数秒後に古いスライドの「退場中」フラグを掃除する
            setTimeout(() => {
                const inactiveId = activeSlideId === 1 ? 2 : 1;
                document.getElementById(`slide${inactiveId}`).classList.remove('leaving');
            }, 3000);
        }

        init();
    </script>
</body>
</html>
