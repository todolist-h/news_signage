<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif; cursor: none; }
        #app { position: relative; width: 100vw; height: 100vh; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1;
            background: #111;
        }
        .active { opacity: 1; z-index: 2; }

        .slide img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            filter: brightness(0.4) saturate(1.1);
        }

        .content-box {
            position: absolute; bottom: 15%; left: 5%; width: 85%;
            padding: 40px; background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px); z-index: 10;
            border-left: 15px solid #00aaff;
            box-sizing: border-box;
        }

        .title { font-size: 3.8rem; font-weight: bold; margin: 0 0 20px 0; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .excerpt { font-size: 1.8rem; line-height: 1.6; color: #ddd; margin: 0; }
        .meta { margin-top: 20px; font-size: 1.4rem; color: #00aaff; font-weight: bold; }
        
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #003366; z-index: 30;
            overflow: hidden; display: flex; align-items: center;
            border-top: 3px solid #00aaff;
        }
        .ticker-text {
            white-space: nowrap; font-size: 2rem; font-weight: bold;
            padding-left: 100%; animation: scroll 30s linear infinite;
        }
        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }
        #progress { position: absolute; bottom: 70px; left: 0; height: 6px; background: #fff; width: 0%; z-index: 25; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="ticker">
        <div class="ticker-text">【学校連絡】明日の朝会は体育館で行います。上履きを忘れないようにしてください。／ 図書室の新着図書が貸出開始になりました。チェックしてみてください！</div>
    </div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            await updateNews();
            render();
            setInterval(render, 8000);
            setInterval(updateNews, 300000); // 5分更新に短縮
        }

        async function updateNews() {
            try {
                // キャッシュ回避のためにランダムなパラメータを付与
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
                console.log("Updated:", newsItems.length);
            } catch (e) { console.error(e); }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            const div = document.createElement('div');
            div.className = 'slide';
            
            const img = document.createElement('img');
            img.src = item.image;
            img.onerror = function() {
                // 失敗時は「教室」の画像を表示
                this.src = "https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1920";
            };

            div.appendChild(img);
            div.innerHTML += `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">NHK NEWS | ${item.time} 更新</div>
                </div>
            `;
            
            app.appendChild(div);
            setTimeout(() => div.classList.add('active'), 100);

            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => { if(old.parentNode) app.removeChild(old); }, 1600);
            }

            const bar = document.getElementById('progress');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '100%'; }, 50);

            currentIndex = (currentIndex + 1) % newsItems.length;
        }
        init();
    </script>
</body>
</html>
