<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oita School Sunshine Signage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 全体：明るく清潔感のある配色 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #e0f2fe; color: #0f172a; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif; cursor: none; }
        
        /* 背景：爽やかなスカイブルーの動き */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f0f9ff 0%, #bae6fd 50%, #7dd3fc 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 1;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        
        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transform: scale(1.05) translateY(20px);
            transition: all 2.2s cubic-bezier(0.23, 1, 0.32, 1);
            visibility: hidden;
        }

        .slide.active { opacity: 1; transform: scale(1) translateY(0); visibility: visible; z-index: 20; }
        .slide.leaving { opacity: 0; transform: scale(0.98) translateY(-20px); z-index: 10; }

        /* コンテンツボックス：すりガラス風の明るい白 */
        .content-box {
            width: 82%; max-width: 1100px; padding: 50px 70px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .header-meta { display: flex; align-items: center; margin-bottom: 20px; }
        
        /* 大分現地情報：親しみやすいオレンジ */
        .source-tag {
            display: inline-flex; align-items: center;
            background: #f59e0b; color: #fff;
            padding: 8px 22px; border-radius: 50px;
            font-size: 1.4rem; font-weight: bold;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        /* 全国ニュース：信頼感のある青 */
        .source-tag.global { background: #0ea5e9; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .source-tag i { margin-right: 10px; }
        
        .genre-name { margin-left: 15px; font-size: 1.2rem; color: #64748b; font-weight: bold; }

        /* タイトル：濃い色でハッキリと */
        .title {
            font-size: 4rem; font-weight: 800; margin-bottom: 25px; line-height: 1.4;
            color: #1e293b; border-bottom: 6px solid #f59e0b; padding-bottom: 20px;
        }
        .title.global { border-bottom-color: #0ea5e9; }

        .excerpt { font-size: 2rem; line-height: 1.7; color: #334155; font-weight: 500; }

        .meta-footer {
            display: flex; justify-content: flex-end; align-items: center;
            margin-top: 35px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 25px;
        }
        .meta-time { font-size: 1.5rem; color: #64748b; font-weight: bold; }

        /* 下部テロップ：明るい紺地に白文字 */
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 75px;
            background: #0f172a; z-index: 50;
            overflow: hidden; display: flex; align-items: center;
        }
        .ticker-text { color: #f8fafc; white-space: nowrap; font-size: 2.2rem; font-weight: bold; padding-left: 100%; animation: scroll 45s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* 時計：右上でさりげなく */
        #clock {
            position: absolute; top: 35px; right: 50px;
            font-size: 2.5rem; font-weight: 700; color: #334155;
            z-index: 100; font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="clock">00:00:00</div>
    <div id="app">
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
    </div>
    <div id="ticker">
        <div class="ticker-text">【大分現地情報】大分合同新聞・OBS大分放送のニュースを配信中。／ 今日も一日、元気に過ごしましょう！</div>
    </div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;

        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                setInterval(nextSlide, 15000); 
            }
            setInterval(updateNews, 300000); 
        }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP');
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            const isLocal = item.source === '大分現地情報';
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="source-tag ${isLocal ? '' : 'global'}">
                            <i class="${item.icon}"></i> ${item.source}
                        </div>
                        <span class="genre-name">${item.genre}</span>
                    </div>
                    <div class="title ${isLocal ? '' : 'global'}">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-footer">
                        <div class="meta-time">${item.time} 更新</div>
                    </div>
                </div>
            `;
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            requestAnimationFrame(() => {
                currentEl.classList.remove('active');
                currentEl.classList.add('leaving');
                nextEl.classList.remove('leaving');
                nextEl.classList.add('active');
            });

            activeSlideId = nextSlideId;
            setTimeout(() => {
                document.getElementById(activeSlideId === 1 ? 'slide2' : 'slide1').classList.remove('leaving');
            }, 2500);
        }
        init();
    </script>
</body>
</html>
