<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: "Helvetica Neue", Arial, sans-serif; cursor: none; }
        #app { position: relative; width: 100vw; height: 100vh; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
        }
        .active { opacity: 1; z-index: 2; }

        .slide img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            filter: brightness(0.45) saturate(1.2);
        }

        .content-box {
            position: absolute; bottom: 15%; left: 5%; width: 85%;
            padding: 40px; background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px); z-index: 10;
            border-left: 15px solid #00aaff;
        }

        .title { font-size: 4rem; font-weight: bold; margin: 0 0 20px 0; line-height: 1.2; text-shadow: 2px 2px 15px rgba(0,0,0,0.8); }
        .excerpt { font-size: 2rem; line-height: 1.6; color: #e5e7eb; margin: 0; }
        .meta { margin-top: 20px; font-size: 1.4rem; color: #60a5fa; font-weight: bold; }
        
        /* テロップ部分 */
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 80, 160, 0.9); z-index: 30;
            overflow: hidden; display: flex; align-items: center;
            border-top: 2px solid #00aaff;
        }
        .ticker-text {
            white-space: nowrap; font-size: 1.8rem; font-weight: bold;
            padding-left: 100%; animation: scroll 25s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        #progress { position: absolute; bottom: 60px; left: 0; height: 6px; background: #fff; width: 0%; z-index: 25; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="ticker">
        <div class="ticker-text">【連絡事項】明日は短縮授業のため、最終下校時刻は 16:30 となります。／ 次回の避難訓練は来週の火曜日です。各自避難経路を確認しておきましょう。</div>
    </div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            await updateNews();
            render();
            setInterval(render, 8000); // 8秒ごとにスライド
            setInterval(updateNews, 600000); // 10分ごとにニュース更新
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            const div = document.createElement('div');
            div.className = 'slide';
            
            const img = document.createElement('img');
            // タイトルに合わせてUnsplashから検索。失敗したら学校風の画像を出す
            img.src = item.image;
            img.onerror = function() {
                this.src = "https://images.unsplash.com/photo-1523050853063-bd80e295c226?q=80&w=1920"; 
            };

            div.appendChild(img);
            div.innerHTML += `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">NHK NEWS | ${item.time} 更新</div>
                </div>
            `;
            
            app.appendChild(div);
            setTimeout(() => div.classList.add('active'), 100);

            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => { if(old.parentNode) app.removeChild(old); }, 1600);
            }

            const bar = document.getElementById('progress');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '100%'; }, 50);

            currentIndex = (currentIndex + 1) % newsItems.length;
        }
        init();
    </script>
</body>
</html>
