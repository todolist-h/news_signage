<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Digital Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; }
        #app { position: relative; width: 100vw; height: 100vh; }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease-in-out; /* ゆっくりフェード */
        }
        .slide.active { opacity: 1; }

        /* Panorama風：左下のテキストボックス */
        .content-box {
            position: absolute; bottom: 8%; left: 5%; width: 60%;
            padding: 40px; color: white;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .title { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; line-height: 1.2; }
        .excerpt { font-size: 1.5rem; line-height: 1.6; opacity: 0.9; }
        .meta { margin-top: 15px; font-size: 1.2rem; color: #ccc; }

        /* プログレスバー：次のニュースまでの残り時間を視覚化 */
        #progress {
            position: absolute; bottom: 0; left: 0; height: 6px;
            background: #fff; width: 0%; transition: width 7s linear;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        const INTERVAL = 7000;
        let newsItems = [];
        let currentIndex = 0;

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                newsItems = await res.json();
                renderSlide();
            } catch (e) { console.error("ニュースの取得に失敗しました"); }
        }

        function renderSlide() {
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            
            // 新しいスライド要素の作成
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.style.backgroundImage = `url(${item.image})`;
            slide.innerHTML = `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">${item.time} 更新</div>
                </div>
            `;
            
            app.appendChild(slide);
            setTimeout(() => slide.classList.add('active'), 50);

            // 古いスライドを削除
            if (app.childNodes.length > 2) {
                app.removeChild(app.firstChild);
            }

            // プログレスバーのリセットと開始
            const bar = document.getElementById('progress');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            setTimeout(() => {
                bar.style.transition = 'width 7s linear';
                bar.style.width = '100%';
            }, 50);

            // 次のインデックスへ
            currentIndex = (currentIndex + 1) % newsItems.length;
        }

        // 初回起動
        updateNews();
        // 7秒ごとにスライド切り替え
        setInterval(renderSlide, INTERVAL);
        // 10分ごとにニュースデータを再取得
        setInterval(updateNews, 10 * 60 * 1000);
    </script>
</body>
</html>
