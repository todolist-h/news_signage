<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Signage</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        #app { position: relative; width: 100vw; height: 100vh; }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1s; z-index: 1;
        }
        .active { opacity: 1; z-index: 2; }
        .content-box {
            position: absolute; bottom: 10%; left: 5%; width: 80%;
            padding: 30px; background: rgba(0,0,0,0.7); z-index: 10;
        }
        .title { font-size: 3rem; font-weight: bold; margin-bottom: 15px; }
        .excerpt { font-size: 1.5rem; line-height: 1.5; }
        #progress { position: absolute; bottom: 0; left: 0; height: 8px; background: #fff; width: 0%; z-index: 20; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            console.log("System Start");
            await updateNews();
            // 初回表示
            render();
            // 7秒ごとに切り替え
            setInterval(render, 7000);
            // 10分ごとにニュース更新
            setInterval(updateNews, 600000);
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data && data.length > 0) {
                    newsItems = data;
                    console.log("Data loaded:", data.length);
                }
            } catch (e) {
                console.error("API Error:", e);
            }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];

            // 新しいスライド作成
            const div = document.createElement('div');
            div.className = 'slide';
            div.style.backgroundImage = "url('" + item.image + "')";
            div.innerHTML = '<div class="content-box">' +
                            '<div class="title">' + item.title + '</div>' +
                            '<div class="excerpt">' + item.excerpt + '</div>' +
                            '</div>';
            app.appendChild(div);

            // フェードイン
            setTimeout(() => div.classList.add('active'), 50);

            // 古いスライド削除
            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => app.removeChild(old), 1100);
            }

            // プログレスバー
            const bar = document.getElementById('progress');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            setTimeout(() => {
                bar.style.transition = 'width 7s linear';
                bar.style.width = '100%';
            }, 50);

            currentIndex = (currentIndex + 1) % newsItems.length;
        }

        init();
    </script>
</body>
</html>
