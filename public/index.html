<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>School Digital Signage (Yahoo)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; cursor: none; }
        #app { position: relative; width: 100vw; height: 100vh; }
        
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1;
            /* 画像が出ない時の予備背景（グラデーション） */
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
        }
        .active { opacity: 1; z-index: 2; }

        .slide img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            filter: brightness(0.5);
        }

        .content-box {
            position: absolute; bottom: 15%; left: 5%; width: 85%;
            padding: 40px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px); z-index: 10;
            border-left: 12px solid #ff0000; /* Yahooカラーっぽく赤に */
        }

        .title { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; line-height: 1.2; }
        .excerpt { font-size: 1.6rem; line-height: 1.6; color: #eee; }
        
        #ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #222; z-index: 30; overflow: hidden; display: flex; align-items: center;
        }
        .ticker-text {
            white-space: nowrap; font-size: 1.8rem; font-weight: bold;
            padding-left: 100%; animation: scroll 30s linear infinite;
        }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        #progress { position: absolute; bottom: 60px; left: 0; height: 6px; background: #ff0000; width: 0%; z-index: 25; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="ticker">
        <div class="ticker-text">【学校連絡】Yahoo!ニュース連携テスト中。画像が表示されない場合は自動で背景が切り替わります。</div>
    </div>
    <div id="progress"></div>

    <script>
        const API_URL = '/api/news';
        let newsItems = [];
        let currentIndex = 0;

        async function init() {
            await updateNews();
            render();
            setInterval(render, 8000);
            setInterval(updateNews, 300000); 
        }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function render() {
            if (newsItems.length === 0) return;
            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            const div = document.createElement('div');
            div.className = 'slide';
            
            if (item.image) {
                const img = document.createElement('img');
                img.src = item.image;
                // Yahooの画像がブロックされたらUnsplashの風景画像を出す
                img.onerror = function() {
                    console.log("Yahoo image blocked, using fallback.");
                    this.src = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80";
                };
                div.appendChild(img);
            }

            div.innerHTML += `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta" style="margin-top:15px; font-size:1.2rem; color:#ff4444;">Yahoo!ニュース (${item.time})</div>
                </div>
            `;
            
            app.appendChild(div);
            setTimeout(() => div.classList.add('active'), 100);

            if (app.children.length > 1) {
                const old = app.children[0];
                old.classList.remove('active');
                setTimeout(() => { if(old.parentNode) app.removeChild(old); }, 1600);
            }

            const bar = document.getElementById('progress');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '100%'; }, 50);

            currentIndex = (currentIndex + 1) % newsItems.length;
        }
        init();
    </script>
</body>
</html>
