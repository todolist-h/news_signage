<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Oita School Signage - Color Sync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #e0f2fe; color: #1e293b; font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif; cursor: none; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f0f9ff, #bae6fd, #7dd3fc); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: 1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #app { position: relative; width: 100vw; height: 100vh; z-index: 10; }
        
        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transform: translate3d(0, 15px, 0);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-out;
            visibility: hidden;
            will-change: opacity, transform;
        }

        .slide.active { opacity: 1; transform: translate3d(0, 0, 0); visibility: visible; z-index: 20; }
        .slide.leaving { opacity: 0; transform: translate3d(0, -15px, 0); z-index: 10; }

        .content-box {
            width: 80%; max-width: 1050px; padding: 45px 65px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .header-meta { display: flex; align-items: center; margin-bottom: 20px; }
        .source-tag { display: inline-flex; align-items: center; color: #fff; padding: 8px 22px; border-radius: 50px; font-size: 1.4rem; font-weight: bold; }
        .source-tag i { margin-right: 10px; }

        .title { font-size: 3.6rem; font-weight: 800; margin-bottom: 25px; line-height: 1.4; color: #0f172a; padding-bottom: 20px; border-bottom: 6px solid #cbd5e1; }
        .excerpt { font-size: 1.9rem; line-height: 1.7; color: #334155; }
        .meta-footer { display: flex; justify-content: flex-end; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .meta-time { font-size: 1.4rem; color: #64748b; font-weight: bold; }

        #ticker-container { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 50; }
        
        /* プログレスバー：色はJSで動的に変更 */
        #progress-bar { width: 0%; height: 6px; background: #f59e0b; transition: width 0.1s linear, background-color 0.5s ease; }

        #ticker { height: 75px; background: #0f172a; overflow: hidden; display: flex; align-items: center; }
        .ticker-text { color: #f8fafc; white-space: nowrap; font-size: 2.2rem; font-weight: bold; padding-left: 100%; animation: scroll 50s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        
        #clock { position: absolute; top: 35px; right: 50px; font-size: 2.4rem; font-weight: bold; color: #334155; z-index: 100; }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div id="clock">00:00:00</div>
    
    <div id="app">
        <div id="slide1" class="slide"></div>
        <div id="slide2" class="slide"></div>
    </div>

    <div id="ticker-container">
        <div id="progress-bar"></div>
        <div id="ticker">
            <div class="ticker-text">【校内ニュース】廊下は静かに歩きましょう。／ 大分合同新聞・OBS大分放送の情報を配信中です。</div>
        </div>
    </div>

    <script>
        const API_URL = '/api/news';
        const SLIDE_DURATION = 8000;
        let newsItems = [];
        let currentIndex = 0;
        let activeSlideId = 1;
        let progressInterval;
        let startTime;

        async function init() {
            updateClock(); setInterval(updateClock, 1000);
            await updateNews();
            if (newsItems.length > 0) {
                updateSlideContent('slide1', newsItems[0]);
                document.getElementById('slide1').classList.add('active');
                startProgress();
            }
            setInterval(updateNews, 300000); 
        }

        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP'); }

        async function updateNews() {
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                const data = await res.json();
                if (data && data.length > 0) newsItems = data;
            } catch (e) { console.error(e); }
        }

        function updateSlideContent(id, item) {
            const el = document.getElementById(id);
            const isLocal = item.source.includes('大分') || item.source.includes('OBS');
            const accentColor = isLocal ? '#f59e0b' : '#3b82f6';
            
            // プログレスバーの色もアクセントカラーに合わせる
            document.getElementById('progress-bar').style.backgroundColor = accentColor;
            
            el.innerHTML = `
                <div class="content-box">
                    <div class="header-meta">
                        <div class="source-tag" style="background: ${accentColor}">
                            <i class="${item.icon}"></i> ${item.source}
                        </div>
                    </div>
                    <div class="title" style="border-bottom-color: ${accentColor}">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta-footer">
                        <div class="meta-time">${item.time} 更新</div>
                    </div>
                </div>
            `;
        }

        function startProgress() {
            clearInterval(progressInterval);
            startTime = Date.now();
            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const percent = (elapsed / SLIDE_DURATION) * 100;
                document.getElementById('progress-bar').style.width = Math.min(percent, 100) + '%';
                
                if (elapsed >= SLIDE_DURATION) {
                    nextSlide();
                }
            }, 100);
        }

        function nextSlide() {
            if (newsItems.length === 0) return;
            currentIndex = (currentIndex + 1) % newsItems.length;
            const nextSlideId = activeSlideId === 1 ? 2 : 1;
            const currentEl = document.getElementById(`slide${activeSlideId}`);
            const nextEl = document.getElementById(`slide${nextSlideId}`);

            updateSlideContent(`slide${nextSlideId}`, newsItems[currentIndex]);

            requestAnimationFrame(() => {
                currentEl.classList.replace('active', 'leaving');
                nextEl.classList.add('active');
            });

            activeSlideId = nextSlideId;
            setTimeout(() => {
                const inactiveId = activeSlideId === 1 ? 2 : 1;
                document.getElementById(`slide${inactiveId}`).classList.remove('leaving');
            }, 1500);

            startProgress();
        }
        init();
    </script>
</body>
</html>
