<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>School Digital Signage</title>
    <style>
        /* CSS：デザイン設定 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; }
        #app { position: relative; width: 100vw; height: 100vh; }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            background-color: #000;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .content-box {
            position: absolute; bottom: 8%; left: 5%; width: 60%;
            padding: 40px; color: white;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .title { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; line-height: 1.2; }
        .excerpt { font-size: 1.5rem; line-height: 1.6; opacity: 0.9; }
        .meta { margin-top: 15px; font-size: 1.2rem; color: #ccc; }

        #progress {
            position: absolute; bottom: 0; left: 0; height: 6px;
            background: #fff; width: 0%; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="progress"></div>

    <script>
        /* JavaScript：ここを最新のロジックに差し替えています */
        const API_URL = '/api/news';
        const INTERVAL = 7000;
        let newsItems = [];
        let currentIndex = 0;

        async function updateNews() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    newsItems = data;
                    if (document.getElementById('app').children.length === 0) {
                        renderSlide();
                    }
                }
            } catch (e) {
                console.error("ニュースの取得に失敗しました", e);
            }
        }

        function renderSlide() {
            if (newsItems.length === 0) return;

            const app = document.getElementById('app');
            const item = newsItems[currentIndex];
            
            const newSlide = document.createElement('div');
            newSlide.className = 'slide';
            newSlide.style.backgroundImage = `url(${item.image})`;
            newSlide.innerHTML = `
                <div class="content-box">
                    <div class="title">${item.title}</div>
                    <div class="excerpt">${item.excerpt}</div>
                    <div class="meta">${item.time} 更新</div>
                </div>
            `;
            
            app.appendChild(newSlide);

            requestAnimationFrame(() => {
                setTimeout(() => {
                    newSlide.classList.add('active');
                }, 50);
            });

            // 古いスライドをフェードアウトさせてから削除
            if (app.children.length > 1) {
                const oldSlide = app.children[0];
                oldSlide.classList.remove('active'); 
                setTimeout(() => {
                    if (oldSlide && oldSlide.parentNode === app) {
                        app.removeChild(oldSlide);
                    }
                }, 1500); 
            }

            // プログレスバーの制御
            const bar = document.getElementById('progress');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            bar.offsetHeight; 
            bar.style.transition = `width ${INTERVAL}ms linear`;
            bar.style.width = '100%';

            currentIndex = (currentIndex + 1) % newsItems.length;
        }

        updateNews();
        setInterval(renderSlide, INTERVAL);
        setInterval(updateNews, 10 * 60 * 1000);
    </script>
</body>
</html>
